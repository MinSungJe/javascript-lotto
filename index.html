<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="p-body">
    <div id="app">
      <section class="modal-background">
        <section class="modal-box">
          <button id="close" class="close-btn"></button>
          <h2 class="p-subtitle">🏆 당첨 통계 🏆</h2>
          <table class="result-table">
            <thead>
              <tr>
                <td>일치 갯수</td>
                <td>당첨금</td>
                <td>당첨 갯수</td>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>3개</td>
                <td>5,000</td>
                <td id="fifth-count">n개</td>
              </tr>
              <tr>
                <td>4개</td>
                <td>50,000</td>
                <td id="fourth-count">n개</td>
              </tr>
              <tr>
                <td>5개</td>
                <td>1,500,000</td>
                <td id="third-count">n개</td>
              </tr>
              <tr>
                <td>5개+보너스볼</td>
                <td>30,000,000</td>
                <td id="second-count">n개</td>
              </tr>
              <tr>
                <td>6개</td>
                <td>2,000,000,000</td>
                <td id="first-count">n개</td>
              </tr>
            </tbody>
          </table>
          <p id="earning-rate" class="p-bold">당신의 총 수익률은 %입니다.</p>
          <button class="main-btn">
            <p id="restart" class="p-caption">다시 시작하기</p>
          </button>
        </section>
      </section>

      <header>
        <h1 id="header-title" class="p-title">🎱 행운의 로또</h1>
      </header>

      <main class="lotto-app-container">
        <h1 class="lotto-title p-title">🎱 내 번호 당첨 확인 🎱</h1>

        <section class="input-box-container">
          <p>구입할 금액을 입력해주세요.</p>
          <div class="input-box">
            <input id="price" placeholder="금액" />
            <button id="buy" class="main-btn">
              <p class="p-caption">구입</p>
            </button>
          </div>
        </section>

        <section class="lotto-container">
          <p id="lotto-status">아직 로또를 구매하지 않았습니다!</p>
          <div id="lotto-ticket-list"></div>
        </section>

        <section class="winning-lotto-container">
          <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
          <div class="winning-lotto">
            <div class="target-number">
              <p>당첨 번호</p>
              <input id="target" class="number-input" />
              <input id="target" class="number-input" />
              <input id="target" class="number-input" />
              <input id="target" class="number-input" />
              <input id="target" class="number-input" />
              <input id="target" class="number-input" />
            </div>
            <div class="bonus-number">
              <p>보너스 번호</p>
              <input id="bonus" class="number-input" />
            </div>
          </div>
        </section>

        <button id="getResult" class="main-btn">
          <p class="p-caption">결과 확인하기</p>
        </button>
      </main>

      <footer>
        <p class="p-caption">Copyright 2023. woowacourse</p>
      </footer>
    </div>

    <template id="lotto-ticket">
      <div class="lotto-ticket-container">
        <p class="p-icon">🎟️</p>
        <p id="lotto-ticket-number">12, 28, 22, 37, 19, 23</p>
      </div>
    </template>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
