<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>🎱 행운의 로또</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="main.css" />
  </head>

  <body class="p-body">
    <div id="app">
      <h1>🎱 행운의 로또</h1>
      <main class="lotto-app-container">
        <h1 class="lotto-title p-title">🎱 내 번호 당첨 확인 🎱</h1>
        <section class="input-box-container">
          <p>구입할 금액을 입력해주세요.</p>
          <div class="input-box">
            <input placeholder="금액" />
            <button class="main-btn"><p class="p-caption">구입</p></button>
          </div>
        </section>
        <section class="lotto-container">
          <p>총 7개를 구매하였습니다.</p>
        </section>

        <section class="winning-lotto-container">
          <p>지난 주 당첨번호 6개와 보너스 번호 1개를 입력해주세요.</p>
          <div class="winning-lotto">
            <div class="target-number">
              <p>당첨 번호</p>
              <input class="number-input" />
              <input class="number-input" />
              <input class="number-input" />
              <input class="number-input" />
              <input class="number-input" />
              <input class="number-input" />
            </div>
            <div class="bonus-number">
              <p>보너스 번호</p>
              <input class="number-input" />
            </div>
          </div>
        </section>

        <button class="main-btn"><p class="p-caption">결과 확인하기</p></button>
      </main>
    </div>

    <template id="lotto-ticket">
      <div class="lotto-ticket-container">
        <p class="p-icon">🎟️</p>
        <p>12, 28, 22, 37, 19, 23</p>
      </div>
    </template>

    <template id="result-modal">
      <div class="modal-background">
        <section class="modal-box">
          <h2 class="p-subtitle">🏆 당첨 통계 🏆</h2>
          <table class="result-table">
            <thead>
              <tr>
                <td>일치 갯수</td>
                <td>당첨금</td>
                <td>당첨 갯수</td>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>3개</td>
                <td>5,000</td>
                <td>n개</td>
              </tr>
              <tr>
                <td>4개</td>
                <td>50,000</td>
                <td>n개</td>
              </tr>
              <tr>
                <td>5개</td>
                <td>1,500,000</td>
                <td>n개</td>
              </tr>
              <tr>
                <td>5개+보너스볼</td>
                <td>30,000,000</td>
                <td>n개</td>
              </tr>
              <tr>
                <td>6개</td>
                <td>2,000,000,000</td>
                <td>n개</td>
              </tr>
            </tbody>
          </table>
          <p class="p-bold">당신의 총 수익률은 %입니다.</p>
          <button class="main-btn">
            <p class="p-caption">다시 시작하기</p>
          </button>
        </section>
      </div>
    </template>

    <script type="module" src="./src/step2-index.js"></script>
  </body>
</html>
